name: Docker Build and Deploy

on:
  push:
    branches:
      - "main"
    tags:
      - "*"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine Docker tag
        id: tag
        run: echo "TAG=$(echo $GITHUB_REF | cut -d'/' -f3)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image with cache
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          sbom: true
          provenance: true
          tags: |
            rjyspl/webmail-docs:latest
            rjyspl/webmail-docs:${{ steps.tag.outputs.TAG }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Server
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          # Copy the docker-compose.yaml file to the server (Replace with existing file)
          scp -o StrictHostKeyChecking=no docker-compose.yaml root@$SERVER_IP:/srv/webmail-docs/docker-compose.yaml

          # Connect and restart the service
          ssh -o StrictHostKeyChecking=no root@$SERVER_IP << 'EOF'
            cd /srv/webmail-docs
            docker compose pull
            docker compose up -d
            docker ps
          EOF
